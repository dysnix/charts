apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ template "op-node.fullname" . }}
  labels:
    {{- include "op-node.labels" . | nindent 4 }}
spec:
  serviceName: {{ template "op-node.name" . }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "op-node.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "op-node.selectorLabels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "op-node.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.init.chownData.enabled .Values.initContainers }}
      initContainers:
      {{- if .Values.init.chownData.enabled }}
      - name: chown-data
        image: "{{ .Values.init.chownData.image.repository }}:{{ .Values.init.chownData.image.tag }}"
        imagePullPolicy: {{ .Values.init.chownData.image.pullPolicy | quote }}
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
        command: ["chown", "-R", "{{ .Values.securityContext.runAsUser }}:{{ .Values.securityContext.runAsGroup }}", "{{ .Values.persistence.mountPath }}"]
        volumeMounts:
        - name: data
          mountPath: {{ .Values.persistence.mountPath }}
      {{- end }}
      {{- with .Values.initContainers }}
        {{- tpl (toYaml . | nindent 6) $ }}
      {{- end }}
      {{- end }}
      containers:
      - name: op-node
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if .Values.command }}
        command:
          {{- tpl (toYaml .Values.command) $ | nindent 10 }}
        {{- else }}
        command:
        - op-node
        {{- end }}
        args:
        - --l1={{ .Values.config.l1.url }}
        - --l1.trustrpc={{ .Values.config.l1.trustrpc }}
        - --l1.rpckind={{ .Values.config.l1.rpckind }}
        {{- with .Values.config.l1.beacon }}
        - --l1.beacon={{ . }}
        {{- end }}
        - --l2={{ .Values.config.l2.url }}
        - --l2.jwt-secret=/secrets/jwt.hex
        {{- with .Values.config.l2.backupUnsafeSyncRpc }}
        - --l2.backup-unsafe-sync-rpc={{ . }}
        {{- end }}
        {{- with .Values.config.safedb.path }}
        - --safedb.path={{ . }}
        {{- end }}
        {{- with .Values.config.l1.cacheSize }}
        - --l1.cache-size={{ . }}
        {{- end }}
        - --rpc.addr=0.0.0.0
        - --rpc.port={{ .Values.config.port }}
        - --network={{ .Values.config.network }}
        {{- with .Values.config.rollup }}
        - --rollup.load-protocol-versions={{ .loadProtocolVersions }}
        {{- with .halt }}
        - --rollup.halt={{ . }}
        {{- end }}
        {{- with .config }}
        - --rollup.config={{ . }}
        {{- end }}
        {{- end }}
        {{- if kindIs "float64" .Values.config.verifier.l1Confs }}
        - --verifier.l1-confs={{ int .Values.config.verifier.l1Confs }}
        {{- end }}
        {{- if .Values.config.metrics.enabled }}
        - --metrics.enabled
        - --metrics.addr=0.0.0.0
        - --metrics.port={{ .Values.config.metrics.port }}
        {{- end }}
        {{- if .Values.config.p2p.nat }}
        - --p2p.nat
        {{- end }}
        {{- if .Values.config.p2p.advertiseIP }}
        - --p2p.advertise.ip={{ .Values.config.p2p.advertiseIP }}
        {{- end }}
        - --p2p.listen.tcp={{ .Values.config.p2p.port }}
        - --p2p.listen.udp={{ .Values.config.p2p.port }}
        - --p2p.listen.ip=0.0.0.0
        {{- with .Values.config.p2p.bootnodes }}
        - --p2p.bootnodes={{ join "," . }}
        {{- end }}
        - --log.level={{ .Values.config.logLevel }}
        {{- with .Values.config.syncmode }}
        - --syncmode={{ . }}
        {{- end }}
        {{- if .Values.config.syncmodeReqResp }}
        - --syncmode.req-resp=true
        {{- end }}
        {{- with .Values.extraArgs }}
        {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
        ports:
        - name: rpc
          containerPort: {{ .Values.config.port }}
        {{- if .Values.config.metrics }}
        - name: metrics
          containerPort: 7300
        {{- end }}
        - name: p2p-tcp
          containerPort: {{ .Values.config.p2p.port }}
          protocol: TCP
          {{- if .Values.config.p2p.useHostPort }}
          hostPort: {{ .Values.config.p2p.port }}
          {{- end }}
        - name: p2p-udp
          containerPort: {{ .Values.config.p2p.port }}
          protocol: UDP
          {{- if .Values.config.p2p.useHostPort }}
          hostPort: {{ .Values.config.p2p.port }}
          {{- end }}
        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          {{- include "op-node.healthcheck" (list $ .Values.livenessProbe) | nindent 10 }}
        {{- end }}
        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          {{- include "op-node.healthcheck" (list $ .Values.readinessProbe) | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: secrets
          mountPath: /secrets
        {{- if .Values.persistence.enabled }}
        - name: data
          mountPath: {{ .Values.persistence.mountPath }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      {{- with .Values.sidecarContainers }}
        {{- tpl (toYaml . | nindent 6) $ }}
      {{- end }}
      volumes:
      - name: secrets
        secret:
          secretName: {{ template "op-node.fullname" . }}
      {{- if and .Values.persistence.enabled (eq .Values.persistence.type "hostPath") }}
      - name: data
        hostPath:
          path: {{ .Values.persistence.hostPath.path }}
          type: {{ .Values.persistence.hostPath.type }}
      {{- end }}
  {{- if and .Values.persistence.enabled (eq .Values.persistence.type "pvc") }}
  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        {{- include "op-node.selectorLabels" . | nindent 8 }}
      {{- with .Values.persistence.pvc.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      accessModes:
      - {{ .Values.persistence.pvc.accessMode }}
      {{- if and .Values.persistence.pvc.storageClass (ne .Values.persistence.pvc.storageClass "-") }}
      storageClassName: {{ .Values.persistence.pvc.storageClass | quote }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.persistence.pvc.size | quote }}
  {{- end }}
